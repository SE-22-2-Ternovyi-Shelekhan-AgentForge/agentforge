version: '3.8'

services:
  gateway:
    build: ./agentforge-gateway/src/AgentForge.Gateway
    container_name: gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - orchestrator

  orchestrator:
    build: ./agentforge-orchestrator/src/AgentForge.Orchestrator
    container_name: orchestrator
    environment:
      - ASPNETCORE_ENVIRONMENT=Development